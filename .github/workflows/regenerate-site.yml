name: Regenerate Site Data

# Triggered manually from the Banyan dashboard after approving submissions.
# Runs only generate_site.py — no health scoring or social collection.

on:
  workflow_dispatch:

jobs:
  regenerate:
    name: Rebuild JSON and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate site data
        working-directory: pipeline
        env:
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python generate_site.py --output-dir ../docs/data

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "chore: regenerate site data [manual] $(date -u +%Y-%m-%d_%H:%M)"
          git push
